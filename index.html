<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 800px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .api-config {
            padding: 12px 16px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 8px;
        }
        
        .api-config input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }
        
        .api-config input:focus {
            border-color: #667eea;
        }
        
        .api-config button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .assistant-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-content {
            line-height: 1.5;
            font-size: 15px;
        }
        
        .typing-indicator {
            background: #f0f0f0;
            padding: 12px 16px;
            border-radius: 20px;
            align-self: flex-start;
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }
        
        .input-area button:active {
            transform: scale(0.95);
        }
        
        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .clear-btn {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 DeepSeek AI 助手</h1>
            <p>由 DeepSeek API 提供支持</p>
        </div>
        
        <div class="api-config">
            <input type="password" id="apiKey" placeholder="请输入 DeepSeek API Key" autocomplete="off">
            <button id="saveKey">保存</button>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message assistant-message">
                <div class="message-content">你好！我是 DeepSeek AI 助手，请输入你的问题～</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn">➤</button>
            <button id="clearBtn" class="clear-btn">🗑️</button>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('deepseek_api_key') || '';
        let messages = [];
        
        // DOM 元素
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKey');
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        // 加载保存的 API Key
        if (API_KEY) {
            apiKeyInput.value = API_KEY;
        }
        
        // 保存 API Key
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                API_KEY = key;
                localStorage.setItem('deepseek_api_key', key);
                addMessage('assistant', '✅ API Key 已保存！现在可以开始对话了。');
                apiKeyInput.value = '';
            } else {
                alert('请输入有效的 API Key');
            }
        });
        
        // 发送消息
        async function sendMessage() {
            if (!API_KEY) {
                addMessage('assistant', '⚠️ 请先在顶部输入并保存你的 DeepSeek API Key');
                return;
            }
            
            const question = userInput.value.trim();
            if (!question) return;
            
            // 添加用户消息
            addMessage('user', question);
            userInput.value = '';
            
            // 添加消息到历史
            messages.push({ role: 'user', content: question });
            
            // 显示打字指示器
            const typingId = showTypingIndicator();
            
            // 禁用发送按钮
            sendBtn.disabled = true;
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        stream: false,
                        temperature: 0.7
                    })
                });
                
                removeTypingIndicator(typingId);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // 添加助手回复
                addMessage('assistant', reply);
                messages.push({ role: 'assistant', content: reply });
                
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', `❌ 错误: ${error.message}`);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        // 添加消息到界面
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
            return id;
        }
        
        // 移除打字指示器
        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }
        
        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 清空对话
        function clearChat() {
            messages = [];
            chatContainer.innerHTML = '';
            addMessage('assistant', '✨ 对话已清空，有什么我可以帮你的吗？');
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // HTML 转义（防止 XSS）
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        // 绑定事件
        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearChat);
    </script>
</body>
</html>
